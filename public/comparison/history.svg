<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(30,12,0,0.55)"/>
    </radialGradient>
    <radialGradient id="light" cx="35%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(255,220,140,0.35)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Warm sepia ground -->
  <rect width="1600" height="700" fill="#c4955a"/>
  <rect width="1600" height="700" fill="url(#light)"/>
  <rect width="1600" height="700" fill="url(#vignette)"/>

  <!-- Subtle grain overlay -->
  <rect width="1600" height="700" fill="rgba(120,70,10,0.08)"/>

  <!-- Large faded year watermark -->
  <text x="800" y="430" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="320" font-weight="900" fill="rgba(80,40,5,0.12)" letter-spacing="-10">1939</text>

  <!-- Centered content block -->
  <rect x="560" y="270" width="480" height="2" fill="rgba(160,100,30,0.5)"/>
  <text x="800" y="310" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="15" letter-spacing="6" fill="rgba(80,45,10,0.7)">HISTORICAL PHOTO PLACEHOLDER</text>
  <text x="800" y="338" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="12" letter-spacing="3" fill="rgba(100,60,20,0.55)">Replace with: /public/comparison/history.jpg · 2400 × 1600 px</text>
  <rect x="560" y="352" width="480" height="1" fill="rgba(160,100,30,0.35)"/>

  <!-- Small illustration elements to suggest vintage feel -->
  <circle cx="380" cy="350" r="60" fill="none" stroke="rgba(140,90,20,0.2)" stroke-width="1.5"/>
  <circle cx="380" cy="350" r="48" fill="none" stroke="rgba(140,90,20,0.15)" stroke-width="1"/>
  <circle cx="1220" cy="350" r="60" fill="none" stroke="rgba(140,90,20,0.2)" stroke-width="1.5"/>
  <circle cx="1220" cy="350" r="48" fill="none" stroke="rgba(140,90,20,0.15)" stroke-width="1"/>
</svg>
