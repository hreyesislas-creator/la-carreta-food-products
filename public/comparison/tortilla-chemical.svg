<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#e4e0cc"/>
      <stop offset="100%" stop-color="#c8c2a0"/>
    </radialGradient>
    <radialGradient id="disk" cx="50%" cy="46%" r="48%">
      <stop offset="0%" stop-color="#d8d0a0"/>
      <stop offset="100%" stop-color="#bab090"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="700" fill="url(#bg)"/>

  <!-- Tortilla disk  dry, muted, slightly yellowish -->
  <ellipse cx="800" cy="330" rx="290" ry="286" fill="url(#disk)" stroke="#b0a878" stroke-width="2.5"/>
  <ellipse cx="800" cy="330" rx="272" ry="268" fill="none" stroke="#c4bc90" stroke-width="1.5" stroke-dasharray="6 5"/>

  <!-- Crack lines suggesting brittleness -->
  <path d="M740 230 Q760 280 750 330 Q742 365 755 400" stroke="#9a9268" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M820 250 Q808 290 815 340 Q820 370 810 410" stroke="#9a9268" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M680 310 Q730 318 780 310 Q820 304 870 312" stroke="#9a9268" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M860 260 Q840 310 855 355 Q866 390 850 430" stroke="#9a9268" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Dry texture spots -->
  <circle cx="730" cy="295" r="4" fill="rgba(140,130,90,0.35)"/>
  <circle cx="845" cy="280" r="3" fill="rgba(140,130,90,0.3)"/>
  <circle cx="780" cy="380" r="4" fill="rgba(140,130,90,0.35)"/>
  <circle cx="860" cy="360" r="3" fill="rgba(140,130,90,0.28)"/>

  <!-- Label -->
  <text x="800" y="590" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="13" letter-spacing="4" fill="rgba(80,74,50,0.6)">TORTILLA WITH PRESERVATIVES PLACEHOLDER</text>
  <text x="800" y="612" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="11" letter-spacing="2" fill="rgba(90,82,56,0.45)">Replace with: /public/comparison/tortilla-chemical.jpg · 1600 × 1200 px</text>
</svg>
